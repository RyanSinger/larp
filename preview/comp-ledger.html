<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;}html{background:var(--parchment);min-height:100%;}
  body{background:var(--parchment);color:var(--ink);font-family:var(--font-body);padding:20px 24px;}
  .swrow{display:flex;gap:0;border:0.75pt solid var(--sepia-line);}
  .sw{flex:1;height:54px;display:flex;align-items:flex-end;padding:5px 7px;font-family:var(--font-head);font-size:8.5px;letter-spacing:.04em;}
  .lbl{font-family:var(--font-head);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  .hex{font-family:var(--font-mono);font-size:8.5px;opacity:.75;}
  .tag{font-family:var(--font-head);font-size:11px;letter-spacing:.04em;padding:1px 7px;border:0.75pt solid;white-space:nowrap;}
  table{width:100%;border-collapse:collapse;border-top:2.4pt double var(--rubric-deep);border-bottom:2.4pt double var(--rubric-deep);font-size:11px;}
   th,td{border:0.5pt solid var(--sepia-line);padding:3px 6px;text-align:left;}
   th{background:var(--parchment-2);font-family:var(--font-head);font-weight:400;text-transform:uppercase;letter-spacing:.04em;color:var(--rubric-deep);border-bottom:1.25pt solid var(--gold);font-size:10px;}
   td{background:var(--parchment-lift);}
   tr:nth-child(even) td{background:#f6efdd;}
   td b{color:var(--ink);}
</style></head><body><div class="lbl">Chancery Ledger Table</div>
   <table>
     <tr><th>Commander</th><th>Fact.</th><th>Price</th><th>Status</th></tr>
     <tr><td><b>Prospero Colonna</b></td><td>Ghi.</td><td>50,000</td><td></td></tr>
     <tr><td><b>Guidobaldo</b></td><td>Ghi.</td><td>&nbsp;</td><td></td></tr>
   </table></body></html>
