<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;}html{background:var(--parchment);min-height:100%;}
  body{background:var(--parchment);color:var(--ink);font-family:var(--font-body);padding:20px 24px;}
  .swrow{display:flex;gap:0;border:0.75pt solid var(--sepia-line);}
  .sw{flex:1;height:54px;display:flex;align-items:flex-end;padding:5px 7px;font-family:var(--font-head);font-size:8.5px;letter-spacing:.04em;}
  .lbl{font-family:var(--font-head);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  .hex{font-family:var(--font-mono);font-size:8.5px;opacity:.75;}
  .tag{font-family:var(--font-head);font-size:11px;letter-spacing:.04em;padding:1px 7px;border:0.75pt solid;white-space:nowrap;}
  .bar{font-family:var(--font-head);background:var(--rubric);color:var(--parchment);font-size:18px;letter-spacing:.05em;padding:5px 12px;border:0.75pt solid var(--rubric-deep);}
   .bar::before{content:"✠  ";color:var(--gold-soft);}
   .h3{font-family:var(--font-body);font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--rubric-deep);font-size:15px;border-bottom:1.5pt solid var(--gold);padding-bottom:3px;margin:16px 0 0;}
</style></head><body><div class="lbl">Headers</div>
   <div class="bar">Mercenary Reference</div>
   <div class="h3">Experienced Commanders</div></body></html>
