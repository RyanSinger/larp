<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;}html{background:var(--parchment);min-height:100%;}
  body{background:var(--parchment);color:var(--ink);font-family:var(--font-body);padding:20px 24px;}
  .swrow{display:flex;gap:0;border:0.75pt solid var(--sepia-line);}
  .sw{flex:1;height:54px;display:flex;align-items:flex-end;padding:5px 7px;font-family:var(--font-head);font-size:8.5px;letter-spacing:.04em;}
  .lbl{font-family:var(--font-head);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  .hex{font-family:var(--font-mono);font-size:8.5px;opacity:.75;}
  .tag{font-family:var(--font-head);font-size:11px;letter-spacing:.04em;padding:1px 7px;border:0.75pt solid;white-space:nowrap;}
  .box{margin:8px 0;font-size:11px;font-family:var(--font-head);letter-spacing:.04em;color:var(--ink-soft);padding:7px 10px;}
   .b-double{border-top:2.4pt double var(--rubric-deep);border-bottom:2.4pt double var(--rubric-deep);}
   .b-hair{border:0.5pt solid var(--sepia-line);}
   .b-edict{border:1pt solid var(--gold);outline:0.5pt solid var(--gold);outline-offset:2px;background:var(--parchment-2);}
   .b-card{border:0.6pt solid var(--sepia-line);border-left:3pt solid var(--rubric);background:var(--parchment-lift);}
</style></head><body><div class="lbl">Borders &amp; Rules</div>
   <div class="box b-double">Double rubric rule — table top/bottom</div>
   <div class="box b-hair">Sepia hairline 0.5pt — cell grid</div>
   <div class="box b-edict">Edict — gold border + offset outline</div>
   <div class="box b-card">Dossier — rubric spine 3pt</div></body></html>
