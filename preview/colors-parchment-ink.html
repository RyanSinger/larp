<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;}html{background:var(--parchment);min-height:100%;}
  body{background:var(--parchment);color:var(--ink);font-family:var(--font-body);padding:20px 24px;}
  .swrow{display:flex;gap:0;border:0.75pt solid var(--sepia-line);}
  .sw{flex:1;height:54px;display:flex;align-items:flex-end;padding:5px 7px;font-family:var(--font-head);font-size:8.5px;letter-spacing:.04em;}
  .lbl{font-family:var(--font-head);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  .hex{font-family:var(--font-mono);font-size:8.5px;opacity:.75;}
  .tag{font-family:var(--font-head);font-size:11px;letter-spacing:.04em;padding:1px 7px;border:0.75pt solid;white-space:nowrap;}
  
</style></head><body><div class="lbl">Parchment &amp; Ink</div>
   <div class="swrow">
     <div class="sw" style="background:#f4ecd8;color:#5a4d3a"><span>Parchment<br><span class="hex" style="color:#5a4d3a;opacity:.85">#f4ecd8</span></span></div>
     <div class="sw" style="background:#efe6cf;color:#5a4d3a"><span>Panel<br><span class="hex" style="color:#5a4d3a;opacity:.85">#efe6cf</span></span></div>
     <div class="sw" style="background:#e7dabb;color:#5a4d3a"><span>Edge<br><span class="hex" style="color:#5a4d3a;opacity:.85">#e7dabb</span></span></div>
     <div class="sw" style="background:#2b2218;color:#fff"><span>Ink fg1<br><span class="hex" style="color:#fff;opacity:.85">#2b2218</span></span></div>
     <div class="sw" style="background:#5a4d3a;color:#fff"><span>Soft fg2<br><span class="hex" style="color:#fff;opacity:.85">#5a4d3a</span></span></div>
   </div></body></html>
