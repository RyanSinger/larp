<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;}html{background:var(--parchment);min-height:100%;}
  body{background:var(--parchment);color:var(--ink);font-family:var(--font-body);padding:20px 24px;}
  .swrow{display:flex;gap:0;border:0.75pt solid var(--sepia-line);}
  .sw{flex:1;height:54px;display:flex;align-items:flex-end;padding:5px 7px;font-family:var(--font-head);font-size:8.5px;letter-spacing:.04em;}
  .lbl{font-family:var(--font-head);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  .hex{font-family:var(--font-mono);font-size:8.5px;opacity:.75;}
  .tag{font-family:var(--font-head);font-size:11px;letter-spacing:.04em;padding:1px 7px;border:0.75pt solid;white-space:nowrap;}
  .profile{background:var(--parchment-lift);border:0.6pt solid var(--sepia-line);border-left:3pt solid var(--rubric);padding:8px 12px;}
   .ph{font-family:var(--font-body);font-weight:700;font-size:14px;color:var(--rubric-deep);}
   .ps{font-family:var(--font-flavor);font-style:italic;font-size:11px;color:var(--ink-soft);margin:2px 0 6px;}
   .pr{font-size:11.5px;margin:2px 0;}
   .pr strong{color:var(--rubric-deep);}
   .tag{vertical-align:middle;font-size:9px;}
</style></head><body><div class="lbl">Character Dossier Card</div>
   <div class="profile">
     <div class="ph">Cardinal Giuliano della Rovere <span class="tag" style="color:#2f5d3a;border-color:#2f5d3a;background:#e3e8d9">ALLY</span></div>
     <div class="ps">Age 49 · Savona · Heir of Sixtus IV · "Uncle Julius"</div>
     <div class="pr"><strong>You want:</strong> His protection in Rome; a place in his faction.</div>
     <div class="pr"><strong>You offer:</strong> Your vote, your mercenary network, loyalty for decades.</div>
   </div></body></html>
